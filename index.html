<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM ARENA Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<style>
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #080808; color: #fff; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
  @media (max-width: 900px) {
    .metrics-grid { grid-template-columns: 1fr 1fr !important; }
    .approval-card { grid-column: span 2 !important; }
    .header { padding: 16px 18px !important; }
    .main { padding: 18px 18px 40px !important; }
  }
  @media (max-width: 560px) {
    .metrics-grid { grid-template-columns: 1fr !important; }
    .approval-card { grid-column: span 1 !important; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header" style="border-bottom:1px solid rgba(255,255,255,0.06); padding:20px 32px; display:flex; align-items:center; justify-content:space-between; gap:24px;">
  <div style="display:flex; flex-direction:column; gap:6px;">
    <img src="https://media.discordapp.net/attachments/1129723268488761384/1491236118606119043/vxsf37k.png?ex=69d6f55c&is=69d5a3dc&hm=e49f0752c3062619e25254f3b8035147198248c1ca827f7235c7f36d40e63c44&=&format=webp&quality=lossless&width=450&height=77" alt="DM ARENA" style="height:44px; width:auto; display:block; object-fit:contain;">
    <div style="font-size:11px; color:#555; letter-spacing:0.08em; text-transform:uppercase; font-weight:500; padding-left:8px;">Analytics Dashboard</div>
  </div>
  <div style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:8px; padding:8px 14px;">
    <div style="width:7px; height:7px; border-radius:50%; background:#4ade80; animation:pulse 2s ease-in-out infinite; flex-shrink:0;"></div>
    <div>
      <div style="font-size:12px; font-weight:600; color:#e5e5e5;" id="statusText">Connecting...</div>
      <div style="font-size:11px; color:#444; margin-top:1px; font-family:'Space Mono',monospace;" id="statusSub">Universe ID: 8960617980</div>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main" style="max-width:1320px; margin:0 auto; padding:28px 32px 48px;">

  <!-- Metrics grid -->
  <div class="metrics-grid" style="display:grid; grid-template-columns:1fr 1fr 1fr 1.4fr; gap:14px; margin-bottom:14px;">

    <!-- Online Players -->
    <div style="background:#0f0f0f; border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:20px 22px; position:relative; overflow:hidden;">
      <div style="position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#3b82f6,transparent);"></div>
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px;">
        <div>
          <div style="font-size:11px; color:#555; letter-spacing:0.06em; text-transform:uppercase; font-weight:600; margin-bottom:14px;">Online Players</div>
          <div style="font-size:40px; font-weight:800; letter-spacing:-0.05em; line-height:1; color:#fff; font-family:'Space Mono',monospace;" id="online">—</div>
          <div style="margin-top:10px; font-size:11px; color:#444;">Live snapshot</div>
        </div>
        <div style="width:38px; height:38px; border-radius:10px; background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <i class="ph-bold ph-user-plus" style="font-size:18px; color:#3b82f6;"></i>
        </div>
      </div>
    </div>

    <!-- Visits -->
    <div style="background:#0f0f0f; border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:20px 22px; position:relative; overflow:hidden;">
      <div style="position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#f59e0b,transparent);"></div>
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px;">
        <div>
          <div style="font-size:11px; color:#555; letter-spacing:0.06em; text-transform:uppercase; font-weight:600; margin-bottom:14px;">Total Visits</div>
          <div style="font-size:40px; font-weight:800; letter-spacing:-0.05em; line-height:1; color:#fff; font-family:'Space Mono',monospace;" id="visits">—</div>
          <div style="margin-top:10px; font-size:11px; color:#444;">All-time experience visits</div>
        </div>
        <div style="width:38px; height:38px; border-radius:10px; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.2); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <i class="ph-bold ph-game-controller" style="font-size:18px; color:#f59e0b;"></i>
        </div>
      </div>
    </div>

    <!-- Favorites -->
    <div style="background:#0f0f0f; border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:20px 22px; position:relative; overflow:hidden;">
      <div style="position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#8b5cf6,transparent);"></div>
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px;">
        <div>
          <div style="font-size:11px; color:#555; letter-spacing:0.06em; text-transform:uppercase; font-weight:600; margin-bottom:14px;">Favorites</div>
          <div style="font-size:40px; font-weight:800; letter-spacing:-0.05em; line-height:1; color:#fff; font-family:'Space Mono',monospace;" id="favorites">—</div>
          <div style="margin-top:10px; font-size:11px; color:#444;">Players who favorited</div>
        </div>
        <div style="width:38px; height:38px; border-radius:10px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <i class="ph-bold ph-star" style="font-size:18px; color:#8b5cf6;"></i>
        </div>
      </div>
    </div>

    <!-- Approval Rating -->
    <div class="approval-card" style="background:#0f0f0f; border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:20px 24px; position:relative; overflow:hidden;">
      <div style="position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#4ade80,transparent);"></div>
      <div style="display:flex; align-items:center; gap:24px;">
        <div style="position:relative; width:88px; height:88px; flex-shrink:0;">
          <canvas id="gaugeCanvas" width="88" height="88"></canvas>
          <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
            <div style="font-size:19px; font-weight:800; letter-spacing:-0.04em; font-family:'Space Mono',monospace;" id="ratingArc">—</div>
          </div>
        </div>
        <div>
          <div style="font-size:11px; color:#555; letter-spacing:0.06em; text-transform:uppercase; font-weight:600; margin-bottom:10px;">Approval Rating</div>
          <div style="display:flex; gap:20px;">
            <div>
              <div style="font-size:11px; color:#4ade80; font-weight:600; margin-bottom:3px;">LIKES</div>
              <div style="font-size:22px; font-weight:800; letter-spacing:-0.04em; font-family:'Space Mono',monospace;" id="likes">—</div>
            </div>
            <div style="width:1px; background:rgba(255,255,255,0.06);"></div>
            <div>
              <div style="font-size:11px; color:#f87171; font-weight:600; margin-bottom:3px;">DISLIKES</div>
              <div style="font-size:22px; font-weight:800; letter-spacing:-0.04em; font-family:'Space Mono',monospace;" id="dislikes">—</div>
            </div>
          </div>
          <div style="margin-top:10px; font-size:11px; color:#444;" id="votesMeta">Total votes: —</div>
        </div>
      </div>
    </div>

  </div>

  <!-- Chart panel -->
  <div style="background:#0f0f0f; border:1px solid rgba(255,255,255,0.07); border-radius:14px; overflow:hidden;">
    <div style="padding:20px 24px 0; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;">
      <div>
        <div style="font-size:15px; font-weight:700; letter-spacing:-0.03em;">Player Activity</div>
        <div style="font-size:12px; color:#555; margin-top:3px;">Online history by collected snapshots</div>
      </div>
      <div style="display:flex; gap:4px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:9px; padding:3px;">
        <button id="btn1h" type="button" style="height:30px; padding:0 14px; border-radius:7px; border:none; background:transparent; color:#666; cursor:pointer; font-size:13px; font-family:'Space Grotesk',sans-serif; font-weight:600;">1H</button>
        <button id="btn24h" type="button" style="height:30px; padding:0 14px; border-radius:7px; border:none; background:#1a1a1a; color:#fff; cursor:pointer; font-size:13px; font-family:'Space Grotesk',sans-serif; font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.4);">24H</button>
        <button id="btn7d" type="button" style="height:30px; padding:0 14px; border-radius:7px; border:none; background:transparent; color:#666; cursor:pointer; font-size:13px; font-family:'Space Grotesk',sans-serif; font-weight:600;">7D</button>
        <button id="btn30d" type="button" style="height:30px; padding:0 14px; border-radius:7px; border:none; background:transparent; color:#666; cursor:pointer; font-size:13px; font-family:'Space Grotesk',sans-serif; font-weight:600;">30D</button>
      </div>
    </div>
    <div style="position:relative; height:360px; padding:16px 8px 8px;">
      <canvas id="chart"></canvas>
      <div id="emptyState" style="position:absolute; inset:0; display:none; align-items:center; justify-content:center; color:#444; font-size:14px;">No history data yet</div>
    </div>
    <div id="errorBox" style="display:none; margin:0 20px 20px; padding:12px 16px; border-radius:10px; border:1px solid rgba(248,113,113,0.15); background:rgba(248,113,113,0.06); color:#f87171; font-size:13px;"></div>
  </div>

</div>

<script>
const numFmt = new Intl.NumberFormat("en-US");
const timeFmt = new Intl.DateTimeFormat("en-US", { hour:"2-digit", minute:"2-digit" });
const timeFmtS = new Intl.DateTimeFormat("en-US", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
const dayHourFmt = new Intl.DateTimeFormat("en-US", { month:"short", day:"numeric", hour:"2-digit" });
const dayFmt = new Intl.DateTimeFormat("en-US", { month:"short", day:"numeric" });

let mode = "24h";
let currentHistory = [];

function fmt(n) { return (typeof n === "number" && !isNaN(n)) ? numFmt.format(n) : "—"; }
function fmtPct(n) { return (typeof n === "number" && !isNaN(n)) ? n.toFixed(1) + "%" : "—"; }
function $(id) { return document.getElementById(id); }

// Gauge
function drawGauge(pct) {
  const canvas = $("gaugeCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const cx = 44, cy = 44, r = 36, lw = 7;
  const startAngle = Math.PI * 0.75;
  const totalAngle = Math.PI * 1.5;
  ctx.clearRect(0, 0, 88, 88);
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, startAngle + totalAngle);
  ctx.strokeStyle = "rgba(255,255,255,0.07)";
  ctx.lineWidth = lw; ctx.lineCap = "round"; ctx.stroke();
  if (pct > 0) {
    const endAngle = startAngle + totalAngle * Math.min(pct / 100, 1);
    const color = pct >= 70 ? "#4ade80" : pct >= 40 ? "#f59e0b" : "#f87171";
    const grad = ctx.createLinearGradient(0, 0, 88, 88);
    grad.addColorStop(0, color); grad.addColorStop(1, color + "99");
    ctx.beginPath();
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.strokeStyle = grad; ctx.lineWidth = lw; ctx.lineCap = "round"; ctx.stroke();
  }
}
drawGauge(0);

// Chart
const chartCanvas = $("chart");
const chartCtx = chartCanvas.getContext("2d");
const grad = chartCtx.createLinearGradient(0, 0, 0, 360);
grad.addColorStop(0, "rgba(59,130,246,0.22)");
grad.addColorStop(1, "rgba(59,130,246,0)");

const chart = new Chart(chartCtx, {
  type: "line",
  data: { labels: [], datasets: [{ label:"Online", data:[], borderColor:"#3b82f6", backgroundColor:grad, fill:true, borderWidth:2, pointRadius:0, pointHoverRadius:5, pointHitRadius:20, pointHoverBackgroundColor:"#fff", pointHoverBorderColor:"#3b82f6", pointHoverBorderWidth:2, tension:0.25, cubicInterpolationMode:"monotone" }] },
  options: {
    responsive: true, maintainAspectRatio: false,
    animation: { duration:400, easing:"easeOutCubic" },
    layout: { padding: { top:8, right:20, bottom:4, left:8 } },
    interaction: { intersect:false, mode:"index" },
    plugins: {
      legend: { display:false },
      tooltip: {
        backgroundColor:"#141414", borderColor:"rgba(255,255,255,0.1)", borderWidth:1,
        displayColors:false, padding:12, titleColor:"#fff", bodyColor:"#aaa", caretPadding:12,
        titleFont:{ family:"'Space Grotesk'", weight:"700", size:13 },
        bodyFont:{ family:"'Space Grotesk'", size:13 },
        callbacks: {
          title(items) {
            const p = currentHistory[items[0].dataIndex]; if (!p) return "";
            const d = new Date(p.t);
            return mode==="1h"?timeFmtS.format(d):mode==="24h"?timeFmt.format(d):mode==="7d"?dayHourFmt.format(d):dayFmt.format(d);
          },
          label(item) { return "Online: " + fmt(Math.round(item.parsed.y)); }
        }
      }
    },
    scales: {
      x: { offset:true, grid:{color:"rgba(255,255,255,0.04)",drawBorder:false,tickLength:0}, border:{display:false},
        ticks:{ color:"#444", maxTicksLimit:6, maxRotation:0, autoSkip:true, padding:12, font:{family:"'Space Mono'",size:11},
          callback(val, idx) { const p=currentHistory[idx]; if(!p) return ""; const d=new Date(p.t); return mode==="1h"?timeFmt.format(d):mode==="24h"?timeFmt.format(d):mode==="7d"?dayHourFmt.format(d):dayFmt.format(d); }
        }
      },
      y: { beginAtZero:true, grace:"12%", grid:{color:"rgba(255,255,255,0.04)",drawBorder:false}, border:{display:false},
        ticks:{ color:"#444", precision:0, padding:12, font:{family:"'Space Mono'",size:11}, callback(v){ return fmt(Math.round(v)); } }
      }
    }
  }
});

function renderChart() {
  chart.data.labels = currentHistory.map(p => p.t);
  chart.data.datasets[0].data = currentHistory.map(p => p.v);
  chart.update();
  $("emptyState").style.display = currentHistory.length ? "none" : "flex";
}

function getBucketSize() {
  if (mode==="1h") return 60000;
  if (mode==="24h") return 5*60000;
  if (mode==="7d") return 3600000;
  return 6*3600000;
}

function normalizeHistory(list) {
  const bucketSize = getBucketSize();
  const usePeak = mode === "7d" || mode === "30d";
  const clean = list.filter(p=>p&&typeof p.t==="number"&&typeof p.v==="number")
    .map(p=>({t:p.t, v:Math.max(0,Math.round(p.v))})).sort((a,b)=>a.t-b.t);
  const grouped = new Map();
  for (const p of clean) {
    const b = Math.floor(p.t/bucketSize)*bucketSize;
    if (!grouped.has(b)) { grouped.set(b, {t:b, v:p.v}); }
    else if (usePeak) { grouped.get(b).v = Math.max(grouped.get(b).v, p.v); }
    else { grouped.get(b).v = p.v; }
  }
  return Array.from(grouped.values()).sort((a,b)=>a.t-b.t);
}

function setError(text) {
  $("errorBox").style.display = text ? "block" : "none";
  $("errorBox").textContent = text || "";
}

function setActiveBtn(active) {
  ["btn1h","btn24h","btn7d","btn30d"].forEach(id => {
    const el=$(id); if(!el) return;
    el.style.background = el.id===active ? "#1a1a1a" : "transparent";
    el.style.color = el.id===active ? "#fff" : "#666";
    el.style.boxShadow = el.id===active ? "0 1px 3px rgba(0,0,0,.4)" : "none";
  });
}

async function loadGame() {
  const res = await fetch("/api/game", { headers:{Accept:"application/json"}, cache:"no-store" });
  if (!res.ok) { let m="HTTP "+res.status; try{const j=await res.json();if(j.error)m=j.error;}catch{} throw new Error(m); }
  const data = await res.json();
  $("online").textContent = fmt(Math.round(data.playing));
  $("visits").textContent = fmt(data.visits);
  $("favorites").textContent = fmt(data.favorites);
  $("likes").textContent = fmt(data.likes);
  $("dislikes").textContent = fmt(data.dislikes);
  const pct = Number(data.rating || 0);
  $("ratingArc").textContent = fmtPct(pct);
  drawGauge(pct);
  $("votesMeta").textContent = "Total votes: " + fmt(Number(data.totalVotes || 0));
  $("statusText").textContent = "Updated " + new Date().toLocaleTimeString();
  $("statusSub").textContent = "Universe ID: " + data.universeId;
}

async function loadHistory() {
  const res = await fetch("/api/history?range="+encodeURIComponent(mode), { headers:{Accept:"application/json"}, cache:"no-store" });
  if (!res.ok) throw new Error("History HTTP "+res.status);
  const json = await res.json();
  currentHistory = normalizeHistory(Array.isArray(json.data) ? json.data : []);
  renderChart();
}

async function refreshAll() {
  try { await Promise.all([loadGame(), loadHistory()]); setError(""); }
  catch(err) { $("statusText").textContent = "Update failed"; setError("Failed to load data. "+(err?.message||"Unknown error")); }
}

const modeMap = { btn1h:"1h", btn24h:"24h", btn7d:"7d", btn30d:"30d" };
["btn1h","btn24h","btn7d","btn30d"].forEach(id => {
  const el = $(id); if (!el) return;
  el.onclick = async () => {
    mode = modeMap[id]; setActiveBtn(id);
    try { await loadHistory(); setError(""); }
    catch(err) { setError("Failed to load history. "+(err?.message||"")); }
  };
});

renderChart();
refreshAll();
setInterval(() => loadGame().catch(()=>{ $("statusText").textContent="Update failed"; }), 10000);
setInterval(() => loadHistory().catch(()=>{}), 30000);
</script>
</body>
</html>
