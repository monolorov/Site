<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM ARENA Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #0a0a0a;
    --panel: #101010;
    --panel2: #141414;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: #8a8a8a;
    --accent: #7fb6ff;
    --accentSoft: rgba(127, 182, 255, 0.14);
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, Arial, sans-serif;
}

body {
    min-height: 100vh;
}

.wrap {
    width: 100%;
    max-width: 1220px;
    margin: 0 auto;
    padding: 26px 18px 42px;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 16px;
}

.title {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.03em;
}

.sub {
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
}

.status {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
}

.stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 14px;
}

.card {
    background: linear-gradient(180deg, var(--panel), var(--panel2));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 22px;
    min-height: 118px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}

.cardLabel {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 10px;
}

.cardValue {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
}

.cardMeta {
    margin-top: 12px;
    color: var(--muted);
    font-size: 12px;
}

.panel {
    background: linear-gradient(180deg, var(--panel), var(--panel2));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 18px 18px 14px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}

.panelHead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
}

.panelTitle {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
}

.controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.modeBtn {
    height: 34px;
    padding: 0 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.01);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    transition: .18s ease;
}

.modeBtn:hover {
    border-color: rgba(127, 182, 255, 0.35);
    background: rgba(255,255,255,0.025);
}

.modeBtn.active {
    border-color: var(--accent);
    background: var(--accentSoft);
    box-shadow: inset 0 0 0 1px rgba(127, 182, 255, 0.08);
}

.chartWrap {
    position: relative;
    height: 420px;
    padding: 14px 14px 6px;
}

.emptyState {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
}

.errorBox {
    display: none;
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.025);
    color: #d1d1d1;
    font-size: 13px;
    line-height: 1.45;
}

@media (max-width: 900px) {
    .stats {
        grid-template-columns: 1fr;
    }

    .panelHead {
        flex-direction: column;
        align-items: flex-start;
    }

    .chartWrap {
        height: 320px;
        padding: 4px 0 0;
    }
}
</style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div>
            <h1 class="title">DM ARENA</h1>
            <div class="sub">Roblox analytics dashboard</div>
        </div>
        <div class="status" id="statusText">Waiting for first update...</div>
    </div>

    <div class="stats">
        <div class="card">
            <div class="cardLabel">Online players</div>
            <div class="cardValue" id="online">—</div>
            <div class="cardMeta" id="onlineMeta">Live snapshot</div>
        </div>

        <div class="card">
            <div class="cardLabel">Visits</div>
            <div class="cardValue" id="visits">—</div>
            <div class="cardMeta">Total experience visits</div>
        </div>

        <div class="card">
            <div class="cardLabel">Favorites</div>
            <div class="cardValue" id="favorites">—</div>
            <div class="cardMeta">Total favorites</div>
        </div>
    </div>

    <div class="panel">
        <div class="panelHead">
            <div class="panelTitle">Player activity</div>
            <div class="controls">
                <button class="modeBtn active" id="btn1h" type="button">1H</button>
                <button class="modeBtn" id="btn24h" type="button">24H</button>
                <button class="modeBtn" id="btn7d" type="button">7D</button>
                <button class="modeBtn" id="btn30d" type="button">30D</button>
            </div>
        </div>

        <div class="chartWrap">
            <canvas id="chart"></canvas>
            <div class="emptyState" id="emptyState">History is empty yet</div>
        </div>

        <div class="errorBox" id="errorBox"></div>
    </div>
</div>

<script>
const gameApiUrl = "/api/game"
const historyApiBase = "/api/history"

const onlineEl = document.getElementById("online")
const visitsEl = document.getElementById("visits")
const favoritesEl = document.getElementById("favorites")
const onlineMeta = document.getElementById("onlineMeta")
const statusText = document.getElementById("statusText")
const errorBox = document.getElementById("errorBox")
const emptyState = document.getElementById("emptyState")

const btn1h = document.getElementById("btn1h")
const btn24h = document.getElementById("btn24h")
const btn7d = document.getElementById("btn7d")
const btn30d = document.getElementById("btn30d")

let mode = "1h"
let currentHistory = []

const numFmt = new Intl.NumberFormat("en-US")
const timeFmt = new Intl.DateTimeFormat("en-US", {
    hour: "2-digit",
    minute: "2-digit"
})
const timeFmtSeconds = new Intl.DateTimeFormat("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
})
const dayHourFmt = new Intl.DateTimeFormat("en-US", {
    month: "short",
    day: "numeric",
    hour: "2-digit"
})
const dayFmt = new Intl.DateTimeFormat("en-US", {
    month: "short",
    day: "numeric"
})

function formatNumber(n) {
    if (typeof n !== "number" || Number.isNaN(n)) return "—"
    return numFmt.format(n)
}

function setModeButtons() {
    btn1h.classList.toggle("active", mode === "1h")
    btn24h.classList.toggle("active", mode === "24h")
    btn7d.classList.toggle("active", mode === "7d")
    btn30d.classList.toggle("active", mode === "30d")
}

function setError(text) {
    if (!text) {
        errorBox.style.display = "none"
        errorBox.textContent = ""
        return
    }

    errorBox.style.display = "block"
    errorBox.textContent = text
}

function getPointLabel(point, detailed) {
    if (!point) return ""

    const date = new Date(point.t)

    if (mode === "1h") {
        return detailed ? timeFmtSeconds.format(date) : timeFmt.format(date)
    }

    if (mode === "24h") {
        return timeFmt.format(date)
    }

    if (mode === "7d") {
        return dayHourFmt.format(date)
    }

    return dayFmt.format(date)
}

function getBucketSize() {
    if (mode === "1h") return 60000
    if (mode === "24h") return 5 * 60 * 1000
    if (mode === "7d") return 60 * 60 * 1000
    if (mode === "30d") return 6 * 60 * 60 * 1000
    return 60000
}

function normalizeHistory(list) {
    const clean = list
        .filter(point => point && typeof point.t === "number" && typeof point.v === "number")
        .map(point => ({
            t: point.t,
            v: Math.max(0, Math.round(point.v))
        }))
        .sort((a, b) => a.t - b.t)

    const bucketSize = getBucketSize()
    const grouped = new Map()

    for (const point of clean) {
        const bucket = Math.floor(point.t / bucketSize) * bucketSize
        grouped.set(bucket, {
            t: bucket,
            v: point.v
        })
    }

    return Array.from(grouped.values()).sort((a, b) => a.t - b.t)
}

const canvas = document.getElementById("chart")
const ctx = canvas.getContext("2d")
const gradient = ctx.createLinearGradient(0, 0, 0, 420)
gradient.addColorStop(0, "rgba(127, 182, 255, 0.28)")
gradient.addColorStop(1, "rgba(127, 182, 255, 0)")

const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Online",
            data: [],
            borderColor: "#7fb6ff",
            backgroundColor: gradient,
            fill: true,
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 4,
            pointHitRadius: 18,
            pointHoverBackgroundColor: "#ffffff",
            pointHoverBorderColor: "#7fb6ff",
            pointHoverBorderWidth: 2,
            tension: 0.22,
            cubicInterpolationMode: "monotone"
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
            duration: 350,
            easing: "easeOutCubic"
        },
        layout: {
            padding: {
                top: 10,
                right: 18,
                bottom: 6,
                left: 10
            }
        },
        interaction: {
            intersect: false,
            mode: "index"
        },
        plugins: {
            legend: {
                display: false
            },
            tooltip: {
                backgroundColor: "#101010",
                borderColor: "rgba(255,255,255,0.08)",
                borderWidth: 1,
                displayColors: false,
                padding: 10,
                titleColor: "#ffffff",
                bodyColor: "#d5d5d5",
                caretPadding: 10,
                callbacks: {
                    title(items) {
                        const point = currentHistory[items[0].dataIndex]
                        return getPointLabel(point, true)
                    },
                    label(item) {
                        return "Online: " + formatNumber(Math.round(item.parsed.y))
                    }
                }
            }
        },
        scales: {
            x: {
                offset: true,
                grid: {
                    color: "rgba(255,255,255,0.04)",
                    drawBorder: false,
                    tickLength: 0
                },
                border: {
                    display: false
                },
                ticks: {
                    color: "#7f7f7f",
                    maxTicksLimit: 5,
                    maxRotation: 0,
                    autoSkip: true,
                    padding: 14,
                    callback(value, index) {
                        return getPointLabel(currentHistory[index], false)
                    }
                }
            },
            y: {
                beginAtZero: true,
                grace: "10%",
                grid: {
                    color: "rgba(255,255,255,0.04)",
                    drawBorder: false
                },
                border: {
                    display: false
                },
                ticks: {
                    color: "#7f7f7f",
                    precision: 0,
                    padding: 10,
                    callback(value) {
                        return formatNumber(Math.round(value))
                    }
                }
            }
        }
    }
})

function renderChart() {
    chart.data.labels = currentHistory.map(point => point.t)
    chart.data.datasets[0].data = currentHistory.map(point => point.v)
    chart.update()
    emptyState.style.display = currentHistory.length ? "none" : "flex"
}

async function loadGame() {
    const res = await fetch(gameApiUrl, {
        headers: {
            Accept: "application/json"
        },
        cache: "no-store"
    })

    if (!res.ok) {
        throw new Error("Game HTTP " + res.status)
    }

    const data = await res.json()

    onlineEl.textContent = formatNumber(Math.round(data.playing))
    visitsEl.textContent = formatNumber(data.visits)
    favoritesEl.textContent = formatNumber(data.favoritedCount)
    onlineMeta.textContent = "Universe ID: " + data.universeId
    statusText.textContent = "Last update: " + new Date().toLocaleTimeString()
}

async function loadHistory() {
    const res = await fetch(`${historyApiBase}?range=${encodeURIComponent(mode)}`, {
        headers: {
            Accept: "application/json"
        },
        cache: "no-store"
    })

    if (!res.ok) {
        throw new Error("History HTTP " + res.status)
    }

    const json = await res.json()
    currentHistory = normalizeHistory(Array.isArray(json.data) ? json.data : [])
    renderChart()
}

async function refreshAll() {
    try {
        await Promise.all([
            loadGame(),
            loadHistory()
        ])
        setError("")
    } catch (err) {
        console.error(err)
        statusText.textContent = "Update failed"
        setError("Failed to load analytics data. Check /api/game, /api/history and your collector.")
    }
}

btn1h.onclick = async function() {
    mode = "1h"
    setModeButtons()
    await loadHistory().catch(console.error)
}

btn24h.onclick = async function() {
    mode = "24h"
    setModeButtons()
    await loadHistory().catch(console.error)
}

btn7d.onclick = async function() {
    mode = "7d"
    setModeButtons()
    await loadHistory().catch(console.error)
}

btn30d.onclick = async function() {
    mode = "30d"
    setModeButtons()
    await loadHistory().catch(console.error)
}

setModeButtons()
renderChart()
refreshAll()
setInterval(loadGame, 10000)
setInterval(loadHistory, 30000)
</script>
</body>
</html>
