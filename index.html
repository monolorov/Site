<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM ARENA Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #0b0b0b;
    --panel: #111111;
    --panel2: #141414;
    --border: #1c1c1c;
    --text: #ffffff;
    --muted: #8c8c8c;
    --accent: #7fb6ff;
    --accentSoft: rgba(127, 182, 255, 0.16);
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    min-height: 100vh;
}

.wrap {
    width: 100%;
    max-width: 1220px;
    margin: 0 auto;
    padding: 28px 18px 40px;
}

.topbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 22px;
}

.title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin: 0;
}

.sub {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
}

.status {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 14px;
}

.card {
    background: linear-gradient(180deg, var(--panel), var(--panel2));
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    min-height: 118px;
    transition: transform .2s ease, border-color .2s ease, background .2s ease;
    opacity: 0;
    transform: translateY(8px);
    animation: rise .45s ease forwards;
}

.card:nth-child(2) {
    animation-delay: .06s;
}

.card:nth-child(3) {
    animation-delay: .12s;
}

.card:hover {
    transform: translateY(-2px);
    border-color: rgba(127, 182, 255, 0.35);
    background: linear-gradient(180deg, #131313, #171717);
}

.cardLabel {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 10px;
}

.cardValue {
    font-size: 34px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: -0.04em;
}

.cardMeta {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
}

.panel {
    background: linear-gradient(180deg, var(--panel), var(--panel2));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    opacity: 0;
    transform: translateY(10px);
    animation: rise .45s ease .18s forwards;
    animation-fill-mode: forwards;
}

.panelHead {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
}

.panelTitle {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
}

.controls {
    display: inline-flex;
    gap: 8px;
    flex-wrap: wrap;
}

.modeBtn {
    height: 34px;
    padding: 0 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease, transform .2s ease;
}

.modeBtn:hover {
    transform: translateY(-1px);
    border-color: rgba(127, 182, 255, 0.35);
}

.modeBtn.active {
    border-color: var(--accent);
    background: var(--accentSoft);
}

.chartBox {
    position: relative;
    height: 420px;
}

.emptyState {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
}

.errorBox {
    display: none;
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
    color: #cfcfcf;
    font-size: 13px;
    line-height: 1.45;
}

@keyframes rise {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 900px) {
    .grid {
        grid-template-columns: 1fr;
    }

    .panelHead {
        flex-direction: column;
        align-items: flex-start;
    }

    .chartBox {
        height: 320px;
    }

    .cardValue {
        font-size: 30px;
    }
}
</style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div>
            <h1 class="title">DM ARENA</h1>
            <div class="sub">Roblox analytics dashboard</div>
        </div>
        <div class="status" id="statusText">Waiting for first update...</div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="cardLabel">Online players</div>
            <div class="cardValue" id="online">—</div>
            <div class="cardMeta" id="onlineMeta">Live snapshot</div>
        </div>

        <div class="card">
            <div class="cardLabel">Visits</div>
            <div class="cardValue" id="visits">—</div>
            <div class="cardMeta">Total experience visits</div>
        </div>

        <div class="card">
            <div class="cardLabel">Favorites</div>
            <div class="cardValue" id="favorites">—</div>
            <div class="cardMeta">Total favorites</div>
        </div>
    </div>

    <div class="panel">
        <div class="panelHead">
            <div class="panelTitle">Player activity</div>
            <div class="controls">
                <button class="modeBtn active" id="btn1h" type="button">1H</button>
                <button class="modeBtn" id="btn24" type="button">24H</button>
                <button class="modeBtn" id="btn7" type="button">7D</button>
                <button class="modeBtn" id="btn30" type="button">30D</button>
            </div>
        </div>

        <div class="chartBox">
            <canvas id="chart"></canvas>
            <div class="emptyState" id="emptyState">History is empty yet. Wait for the collector to save a few points.</div>
        </div>

        <div class="errorBox" id="errorBox"></div>
    </div>
</div>

<script>
const gameApiUrl = "/api/game"
const historyApiBase = "/api/history"

const onlineEl = document.getElementById("online")
const visitsEl = document.getElementById("visits")
const favoritesEl = document.getElementById("favorites")
const statusText = document.getElementById("statusText")
const onlineMeta = document.getElementById("onlineMeta")
const btn1h = document.getElementById("btn1h")
const btn24 = document.getElementById("btn24")
const btn7 = document.getElementById("btn7")
const btn30 = document.getElementById("btn30")
const emptyState = document.getElementById("emptyState")
const errorBox = document.getElementById("errorBox")

let mode = "1h"
let currentHistory = []
let gameTimer = null
let historyTimer = null

const numberFmt = new Intl.NumberFormat("en-US")
const timeFmt = new Intl.DateTimeFormat("en-US", {
    hour: "2-digit",
    minute: "2-digit"
})
const dayHourFmt = new Intl.DateTimeFormat("en-US", {
    month: "short",
    day: "numeric",
    hour: "2-digit"
})
const dayFmt = new Intl.DateTimeFormat("en-US", {
    month: "short",
    day: "numeric"
})

function formatNumber(n) {
    if (typeof n !== "number" || Number.isNaN(n)) return "—"
    return numberFmt.format(n)
}

function getLabelForPoint(point) {
    if (!point) return ""

    if (mode === "1h") return timeFmt.format(point.t)
    if (mode === "24h") return timeFmt.format(point.t)
    if (mode === "7d") return dayHourFmt.format(point.t)
    return dayFmt.format(point.t)
}

function setActiveButton() {
    btn1h.classList.toggle("active", mode === "1h")
    btn24.classList.toggle("active", mode === "24h")
    btn7.classList.toggle("active", mode === "7d")
    btn30.classList.toggle("active", mode === "30d")
}

function showError(text) {
    errorBox.style.display = "block"
    errorBox.textContent = text
}

function hideError() {
    errorBox.style.display = "none"
    errorBox.textContent = ""
}

const ctx = document.getElementById("chart")
const gradient = ctx.getContext("2d").createLinearGradient(0, 0, 0, 420)
gradient.addColorStop(0, "rgba(127, 182, 255, 0.28)")
gradient.addColorStop(1, "rgba(127, 182, 255, 0.00)")

const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Online",
            data: [],
            borderColor: "#7fb6ff",
            backgroundColor: gradient,
            fill: true,
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 4,
            pointHoverBackgroundColor: "#ffffff",
            pointHoverBorderColor: "#7fb6ff",
            pointHoverBorderWidth: 2,
            tension: 0.35
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
            duration: 450,
            easing: "easeOutCubic"
        },
        interaction: {
            intersect: false,
            mode: "index"
        },
        plugins: {
            legend: {
                display: false
            },
            tooltip: {
                backgroundColor: "#101010",
                borderColor: "rgba(255,255,255,0.08)",
                borderWidth: 1,
                displayColors: false,
                padding: 10,
                titleColor: "#ffffff",
                bodyColor: "#d8d8d8",
                callbacks: {
                    title(items) {
                        const item = items[0]
                        const point = currentHistory[item.dataIndex]
                        return getLabelForPoint(point)
                    },
                    label(item) {
                        return "Online: " + formatNumber(item.parsed.y)
                    }
                }
            }
        },
        scales: {
            x: {
                grid: {
                    color: "rgba(255,255,255,0.04)",
                    drawBorder: false
                },
                ticks: {
                    maxTicksLimit: 8,
                    color: "#7f7f7f",
                    callback(value, index) {
                        const point = currentHistory[index]
                        return getLabelForPoint(point)
                    }
                }
            },
            y: {
                beginAtZero: true,
                grid: {
                    color: "rgba(255,255,255,0.04)",
                    drawBorder: false
                },
                ticks: {
                    color: "#7f7f7f",
                    callback(value) {
                        return formatNumber(value)
                    }
                }
            }
        }
    }
})

function renderChart() {
    chart.data.labels = currentHistory.map(point => getLabelForPoint(point))
    chart.data.datasets[0].data = currentHistory.map(point => point.v)
    chart.update()
    emptyState.style.display = currentHistory.length ? "none" : "flex"
}

async function loadGame() {
    const res = await fetch(gameApiUrl, {
        method: "GET",
        headers: {
            Accept: "application/json"
        },
        cache: "no-store"
    })

    if (!res.ok) {
        throw new Error("Game HTTP " + res.status)
    }

    const data = await res.json()

    if (!data || typeof data.playing !== "number") {
        throw new Error("Bad game response")
    }

    onlineEl.textContent = formatNumber(data.playing)
    visitsEl.textContent = formatNumber(data.visits)
    favoritesEl.textContent = formatNumber(data.favoritedCount)

    const now = new Date()
    statusText.textContent = "Last update: " + now.toLocaleTimeString()
    onlineMeta.textContent = "Universe ID: " + data.universeId
}

async function loadHistory() {
    const res = await fetch(`${historyApiBase}?range=${encodeURIComponent(mode)}`, {
        method: "GET",
        headers: {
            Accept: "application/json"
        },
        cache: "no-store"
    })

    if (!res.ok) {
        throw new Error("History HTTP " + res.status)
    }

    const json = await res.json()
    const list = Array.isArray(json.data) ? json.data : []

    currentHistory = list.filter(point => point && typeof point.t === "number" && typeof point.v === "number")
    renderChart()
}

async function refreshAll() {
    try {
        await Promise.all([
            loadGame(),
            loadHistory()
        ])
        hideError()
    } catch (err) {
        console.error(err)
        statusText.textContent = "Update failed"
        showError("Failed to load /api/game or /api/history. Check Vercel deploy, Upstash env vars and that /api/collect is being called by cron-job.org.")
    }
}

btn1h.onclick = async () => {
    mode = "1h"
    setActiveButton()
    await loadHistory().catch(console.error)
}

btn24.onclick = async () => {
    mode = "24h"
    setActiveButton()
    await loadHistory().catch(console.error)
}

btn7.onclick = async () => {
    mode = "7d"
    setActiveButton()
    await loadHistory().catch(console.error)
}

btn30.onclick = async () => {
    mode = "30d"
    setActiveButton()
    await loadHistory().catch(console.error)
}

setActiveButton()
renderChart()
refreshAll()
gameTimer = setInterval(loadGame, 10000)
historyTimer = setInterval(loadHistory, 30000)
</script>
</body>
</html>
