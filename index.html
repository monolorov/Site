<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM ARENA Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

h1 {
    font-size: 28px;
    margin-bottom: 30px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 30px;
}

.card {
    background: #121212;
    padding: 20px;
    border-radius: 10px;
    transition: 0.2s;
    border: 1px solid #1a1a1a;
}

.card:hover {
    border-color: #2a8cff;
    transform: translateY(-2px);
}

.label {
    color: #777;
    font-size: 14px;
}

.value {
    font-size: 26px;
    margin-top: 8px;
}

.chartWrap {
    background: #121212;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #1a1a1a;
}

.controls {
    margin-bottom: 15px;
}

button {
    background: transparent;
    border: 1px solid #1a1a1a;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    margin-right: 6px;
    cursor: pointer;
}

button.active {
    border-color: #2a8cff;
}

canvas {
    max-height: 300px;
}
</style>
</head>

<body>
<div class="container">
    <h1>DM ARENA</h1>

    <div class="cards">
        <div class="card">
            <div class="label">Online players</div>
            <div class="value" id="online">—</div>
        </div>
        <div class="card">
            <div class="label">Visits</div>
            <div class="value" id="visits">—</div>
        </div>
        <div class="card">
            <div class="label">Favorites</div>
            <div class="value" id="favorites">—</div>
        </div>
    </div>

    <div class="chartWrap">
        <div class="controls">
            <button id="btn24" class="active">24H</button>
            <button id="btn7">7D</button>
        </div>
        <canvas id="chart"></canvas>
    </div>
</div>

<script>
const universeId = "YOUR_ID"

const format = n => n?.toLocaleString()

const onlineEl = document.getElementById("online")
const visitsEl = document.getElementById("visits")
const favEl = document.getElementById("favorites")

let mode = "24h"

const ctx = document.getElementById("chart")

let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            data: [],
            tension: 0.3
        }]
    },
    options: {
        plugins: { legend: { display: false }},
        scales: {
            x: { display: false },
            y: { display: false }
        }
    }
})

function savePoint(val) {
    let data = JSON.parse(localStorage.getItem("history") || "[]")
    data.push({ t: Date.now(), v: val })

    data = data.filter(p => Date.now() - p.t < 7 * 86400000)

    localStorage.setItem("history", JSON.stringify(data))
}

function loadData() {
    let data = JSON.parse(localStorage.getItem("history") || "[]")

    let range = mode === "24h" ? 86400000 : 7 * 86400000
    data = data.filter(p => Date.now() - p.t < range)

    chart.data.labels = data.map(p => "")
    chart.data.datasets[0].data = data.map(p => p.v)
    chart.update()
}

async function fetchData() {
    try {
        const res = await fetch(`https://games.roblox.com/v1/games?universeIds=${universeId}`)
        const json = await res.json()
        const game = json.data[0]

        onlineEl.textContent = format(game.playing)
        visitsEl.textContent = format(game.visits)
        favEl.textContent = format(game.favoritedCount)

        savePoint(game.playing)
        loadData()
    } catch (e) {
        onlineEl.textContent = "ERR"
    }
}

setInterval(fetchData, 10000)
fetchData()

document.getElementById("btn24").onclick = () => {
    mode = "24h"
    btn24.classList.add("active")
    btn7.classList.remove("active")
    loadData()
}

document.getElementById("btn7").onclick = () => {
    mode = "7d"
    btn7.classList.add("active")
    btn24.classList.remove("active")
    loadData()
}
</script>
</body>
</html>
